    <title>WWF | 북금곰 후원페이지</title>
    <link rel="shortcut icon" href="./images/logo.jpg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/common.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>
<body>
    <div id="wrap">
        <!-- 1행 캠페인 표지 -->
        <section class="container intro">
            <p class="logo"><img src="./images/logo.jpg" alt=""></p>
            <h1><span>생존의 벼랑 끝에 서 있는</span><span>북극곰을 지켜주세요</span></h1>
            <a href="#" class="sponsor_btn"><em>북극곰 후원하기</em><!-- a::after --></a>
        </section>
        <!-- 2행 퀴즈 -->
        <div class="container quiz_bg">
            <section class="contents quiz">
                <div class="quiz_list">
                    <h1>Quiz</h1>
                    <h2><span>20년 사이 북극 빙하 면적은 </span><span>몇 % 감소했을까요?</span></h2>
                    <form action="#" method="get" id="quiz_form">
                        <ul>
                            <li><input type="radio" id="per_30" name="quiz_group" value=""><label for="per_30">30%</label></li>
                            <li><input type="radio" id="per_40" name="quiz_group" value=""><label for="per_40">40%</label></li>
                            <li><input type="radio" id="per_50" name="quiz_group" value=""><label for="per_50">50%</label></li>
                            <li><input type="radio" id="per_60" name="quiz_group" value=""><label for="per_60">60%</label></li>
                        </ul>
                        <button type="button" id="answer_btn">정답 확인 하기</button>
                    </form>
                </div>
                <div class="quiz_status">
                    <img src="./images/quiz_contents.png" alt="">
                    <p>*퀴즈 참여 현황은 매주 업데이트 됩니다</p>
                </div>
            </section>
        </div>
        <!-- 3행 동영상 -->
